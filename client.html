<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Project Hub</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--accent:#185FA5;--accent-dk:#0D3B6E;--green:#16a34a;--green-mid:#3B6D11;--green-lt:#EAF3DE;--green-border:#97C459;--border:#e0dfd8;--border2:#cccbc4;--text:#1a1a18;--text2:#5f5e5a;--text3:#9a9890;--bg:#f7f7f5;--bg2:#fff;--r:10px;--rl:14px;--navy:#0D1117;--red:#A32D2D;--red-lt:#FFF0F0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
.topbar-logo-img{height:28px;max-width:100px;object-fit:contain;display:none;border-radius:4px}
.topbar-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.left-nav{width:220px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:none;flex-direction:column}
.nav-client{padding:14px 18px 10px;border-bottom:1px solid var(--border);margin-bottom:4px}
.nav-client-name{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-client-addr{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:10px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:background .15s,color .15s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--bg);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-footer{margin-top:auto;padding:14px 18px;font-size:10px;color:var(--text3)}
.body-wrap{padding-top:52px;min-height:100vh}
.main-content{max-width:700px;margin:0 auto;padding:20px 16px 80px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;padding:10px 4px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.bn-item.active{color:var(--accent)}
.bn-icon{font-size:22px;line-height:1}
@media(min-width:640px){.bottom-nav{display:none}.left-nav{display:flex;position:sticky;top:52px;height:calc(100vh - 52px)}.body-wrap{display:flex;align-items:flex-start}.main-content{flex:1;min-width:0;padding-bottom:40px}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-hdr{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-green{background:var(--green)}
.btn-sec{background:var(--bg2);color:var(--text2);border:1.5px solid var(--border2);font-size:13px;padding:11px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.row:last-child{border-bottom:none;padding-bottom:0}
.rl{color:var(--text3)}.rv{font-weight:600;text-align:right}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-won{background:var(--green-lt);color:var(--green-mid)}
.hero-card{background:linear-gradient(135deg,#0D1117 0%,#1a365d 100%);border-radius:var(--rl);padding:22px 20px 20px;margin-bottom:18px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;right:-40px;top:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-biz{font-size:21px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:3px}
.hero-sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);margin-bottom:6px}
.hero-client{font-size:16px;font-weight:700;color:#fff}
.hero-meta{margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:flex-end}
.balance-box{background:var(--red-lt);border:2px solid var(--red);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.balance-lbl{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.balance-amt{font-size:34px;font-weight:800;color:var(--red);letter-spacing:-.5px;margin-bottom:14px}
.paid-box{background:var(--green-lt);border:1px solid var(--green-border);border-radius:var(--rl);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.bid-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:10px}
.bid-row:last-child{margin-bottom:0}
.job-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.job-row:last-child{border-bottom:none}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-thumb{aspect-ratio:1;border-radius:var(--r);overflow:hidden;background:var(--bg);cursor:pointer;position:relative}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-tag{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.pg-status{text-align:center;padding:80px 20px}
.pg-status-icon{font-size:64px;margin-bottom:16px}
.pg-status h2{font-size:24px;font-weight:800;margin-bottom:10px}
.pg-status p{font-size:14px;color:var(--text2);line-height:1.7;max-width:380px;margin:0 auto}
.empty{color:var(--text3);font-size:13px;text-align:center;padding:20px 0}
.view-title{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:18px}
#inv-overlay{position:fixed;inset:0;background:#fff;z-index:500;overflow-y:auto;display:none}
.inv-wrap{max-width:680px;margin:0 auto;padding:32px 24px 60px}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:24px;border-bottom:3px solid #185FA5}
.inv-co-name{font-size:24px;font-weight:800;color:#185FA5}
.inv-co-sub{font-size:12px;color:#666;margin-top:4px}
.inv-title-block{text-align:right}
.inv-title-block h1{font-size:32px;font-weight:800;color:#1a1a18;letter-spacing:-.02em}
.inv-title-num{font-size:12px;color:#666;margin-top:4px}
.inv-two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.inv-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:6px}
.inv-client-name{font-size:16px;font-weight:700}
.inv-detail{font-size:13px;color:#444;margin-top:2px;line-height:1.5}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table th{text-align:left;padding:8px 10px;background:#f5f5f3;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#666;border-bottom:1px solid #e0e0dc}
.inv-table td{padding:10px;border-bottom:1px solid #f0eeec;font-size:13px;vertical-align:top}
.inv-table td.amt{text-align:right;font-weight:600}
.inv-totals{margin-left:auto;width:260px}
.inv-total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f0eeec}
.inv-total-grand{font-size:16px;font-weight:800;border-top:2px solid #1a1a18;border-bottom:none;padding-top:10px;margin-top:4px}
.inv-footer-text{margin-top:40px;padding-top:16px;border-top:1px solid #e0e0dc;font-size:11px;color:#999;text-align:center}
.inv-close{position:fixed;top:16px;right:16px;background:var(--navy);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;z-index:10}
#prop-overlay{position:fixed;inset:0;background:#fff;z-index:500;overflow-y:auto;display:none}
.prop-wrap{max-width:680px;margin:0 auto;padding:32px 24px 60px}
.prop-close{position:fixed;top:16px;right:16px;background:var(--navy);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;z-index:10}
@media print{.topbar,.left-nav,.bottom-nav,.inv-close,.prop-close,.no-print{display:none!important}#inv-overlay,#prop-overlay{position:static!important}.inv-wrap,.prop-wrap{padding:16px}body{background:#fff}}
</style>
</head>
<body>
<div class="topbar">
  <img id="topbar-logo-img" class="topbar-logo-img" alt="Logo">
  <span id="topbar-name" class="topbar-name"></span>
</div>
<div class="body-wrap">
  <nav class="left-nav" id="left-nav">
    <div class="nav-client" id="nav-client-info"></div>
    <div class="nav-item active" id="ni-home" onclick="switchView('home')"><span class="nav-icon">🏠</span>Home</div>
    <div class="nav-item" id="ni-proposals" onclick="switchView('proposals')"><span class="nav-icon">📋</span>Proposals</div>
    <div class="nav-item" id="ni-payments" onclick="switchView('payments')"><span class="nav-icon">💳</span>Payments</div>
    <div class="nav-item" id="ni-photos" onclick="switchView('photos')"><span class="nav-icon">📷</span>Photos</div>
    <div class="nav-footer" id="nav-footer">Powered by TradeDesk</div>
  </nav>
  <div class="main-content">
    <div class="pg-status" id="pg-load"><div class="pg-status-icon">⏳</div><h2>Loading your hub…</h2><p>Just a moment.</p></div>
    <div class="pg-status" id="pg-err" style="display:none"><div class="pg-status-icon">🔗</div><h2>Hub not found</h2><p>This link may have expired. Contact your contractor for a new link.</p></div>
    <div id="pg-hub" style="display:none">
      <div id="view-home"></div>
      <div id="view-proposals" style="display:none"></div>
      <div id="view-payments" style="display:none"></div>
      <div id="view-photos" style="display:none"></div>
    </div>
  </div>
</div>
<nav class="bottom-nav" id="bottom-nav">
  <button class="bn-item active" id="bni-home" onclick="switchView('home')"><span class="bn-icon">🏠</span>Home</button>
  <button class="bn-item" id="bni-proposals" onclick="switchView('proposals')"><span class="bn-icon">📋</span>Proposals</button>
  <button class="bn-item" id="bni-payments" onclick="switchView('payments')"><span class="bn-icon">💳</span>Payments</button>
  <button class="bn-item" id="bni-photos" onclick="switchView('photos')"><span class="bn-icon">📷</span>Photos</button>
</nav>
<div id="inv-overlay">
  <button class="inv-close no-print" onclick="closeInvoice()">✕</button>
  <div class="inv-wrap" id="inv-content"></div>
</div>
<div id="prop-overlay">
  <button class="prop-close no-print" onclick="closeProp()">✕</button>
  <div class="prop-wrap" id="prop-content"></div>
</div>
<script>
const SUPA_URL='https://mwtsmctajhrrybblgorf.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13dHNtY3RhamhycnliYmxnb3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjIwNjMsImV4cCI6MjA5MDczODA2M30.-FMn1pEs9PpCvv8eGwSbtucWAWvcfEcQ1SYx4nD207M';
const _supa=supabase.createClient(SUPA_URL,SUPA_KEY);
let _hub=null,_activeView='home';
const fmt=n=>'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=s=>{if(!s)return'';try{return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return s;}};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
async function init(){
  const p=new URLSearchParams(location.search);
  const t=p.get('t'),u=p.get('u'),c=p.get('c'),mode=p.get('mode');
  if(mode==='onboard'){initOnboard(t,u,c);return;}
  if(!t||!u||!c){showState('err');return;}
  try{
    const key='client-hub/'+u+'/'+c+'_'+t+'.json';
    const{data,error}=await _supa.storage.from('proposals').download(key);
    if(error||!data){
      // Hub JSON not ready yet — check if they completed onboarding on this device
      const p2=new URLSearchParams(location.search);
      const cid=p2.get('c');
      if(cid&&localStorage.getItem('td_onb_done_'+cid)){showQuoteInProgress(null);return;}
      showState('err');return;
    }
    _hub=JSON.parse(await data.text());
    const bidIds=_hub.bids.map(b=>String(b.id));
    if(u&&bidIds.length){
      try{
        const{data:sigs}=await _supa.from('signed_proposals')
          .select('bid_id,payment_status,payment_method,signed_at')
          .eq('contractor_user_id',u).in('bid_id',bidIds);
        if(sigs)sigs.forEach(sp=>{
          const bid=_hub.bids.find(b=>String(b.id)===sp.bid_id);
          if(bid&&bid.status==='Pending'){
            bid.status='Closed Won';bid.signedAt=sp.signed_at;bid.paymentStatus=sp.payment_status;
            if(sp.payment_status==='paid')bid.balance=Math.max(0,(bid.balance||0)-(bid.deposit||0));
          }
        });
      }catch(e){console.warn('sig check:',e);}
    }
    applyBranding(_hub);renderAll();showState('hub');
    if(location.hash.startsWith('#paid-')){
      const bidId=parseInt(location.hash.replace('#paid-',''));
      if(bidId)setTimeout(()=>showPaymentSuccess(bidId),300);
      history.replaceState(null,'',location.pathname+location.search);
    }else if(location.hash.startsWith('#invoice-')){
      const bidId=parseInt(location.hash.replace('#invoice-',''));
      if(bidId)setTimeout(()=>openInvoice(bidId),300);
    }
  }catch(e){console.error(e);showState('err');}
}
async function initOnboard(t,u,c){
  if(!t||!u||!c){showState('err');return;}
  // Load hub data for branding + client name
  try{
    const key='client-hub/'+u+'/'+c+'_'+t+'.json';
    const{data,error}=await _supa.storage.from('proposals').download(key);
    if(!error&&data){_hub=JSON.parse(await data.text());}
  }catch(e){}
  // Apply branding if hub loaded, else minimal topbar
  if(_hub){
    applyBranding(_hub);
    document.title=(_hub.contractorName||'Your Contractor')+' — Get a Quote';
  }else{
    document.getElementById('topbar-name').textContent='Get a Quote';
  }
  // Hide hub nav, show onboarding form
  document.getElementById('left-nav').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('pg-hub').style.display='none';
  document.getElementById('pg-load').style.display='none';
  // Check if already completed — hub address OR localStorage flag (set on this device after submit)
  if((_hub&&_hub.clientAddr)||localStorage.getItem('td_onb_done_'+c)){
    showQuoteInProgress(_hub);
    return;
  }
  const firstName=_hub?.clientName?.split(' ')[0]||'';
  const contractorName=_hub?.contractorName||'Your contractor';
  const formHtml=
    '<div class="main-content" style="padding-top:72px;padding-bottom:40px;max-width:480px">'+
    '<div style="text-align:center;margin-bottom:28px">'+
      '<div style="font-size:36px;margin-bottom:8px">📋</div>'+
      '<div style="font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px">'+(firstName?'Hi '+esc(firstName)+'!':'Get your free quote')+'</div>'+
      '<div style="font-size:14px;color:var(--text2);line-height:1.6">'+esc(contractorName)+' needs a couple details to prepare your quote — takes about 2 minutes.</div>'+
    '</div>'+
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px">'+
      '<div style="margin-bottom:16px">'+
        '<label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:block;margin-bottom:6px">Property address</label>'+
        '<input id="onb-addr" type="text" placeholder="123 Main St, City, State" autocomplete="street-address" style="width:100%;box-sizing:border-box;padding:13px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:16px;font-family:inherit;background:var(--bg2);color:var(--text)">'+
        '<div id="onb-addr-err" style="display:none;font-size:12px;color:var(--red);margin-top:4px">Please enter the property address.</div>'+
      '</div>'+
      '<div style="margin-bottom:16px">'+
        '<label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:block;margin-bottom:6px">What are you looking to get painted?</label>'+
        '<textarea id="onb-notes" rows="3" placeholder="Interior walls, exterior trim, garage, deck..." style="width:100%;box-sizing:border-box;padding:13px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:15px;font-family:inherit;background:var(--bg2);color:var(--text);resize:none"></textarea>'+
      '</div>'+
      '<div style="margin-bottom:20px">'+
        '<label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:block;margin-bottom:8px">Best time to call you?</label>'+
        '<div style="display:flex;gap:8px" id="onb-time-btns">'+
          '<button type="button" onclick="onbTime(this,\'Morning\')" style="flex:1;padding:11px 6px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)">Morning</button>'+
          '<button type="button" onclick="onbTime(this,\'Afternoon\')" style="flex:1;padding:11px 6px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)">Afternoon</button>'+
          '<button type="button" onclick="onbTime(this,\'Evening\')" style="flex:1;padding:11px 6px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)">Evening</button>'+
        '</div>'+
      '</div>'+
      '<button id="onb-submit" onclick="submitOnboard(\''+u+'\','+c+')" style="width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit">Send my details →</button>'+
    '</div>'+
    '<div style="text-align:center;margin-top:20px;font-size:12px;color:var(--text3)">'+esc(contractorName)+'</div>'+
    '</div>';
  // Replace body-wrap content
  document.querySelector('.body-wrap').innerHTML=document.querySelector('.body-wrap').innerHTML;
  document.querySelector('.body-wrap').outerHTML='<div class="body-wrap" style="padding-top:52px">'+formHtml+'</div>';
  window._onbCallTime='';
}
function onbTime(btn,val){
  window._onbCallTime=val;
  document.querySelectorAll('#onb-time-btns button').forEach(b=>{
    b.style.background='var(--bg)';b.style.borderColor='var(--border2)';b.style.color='var(--text)';
  });
  btn.style.background='var(--accent)';btn.style.borderColor='var(--accent)';btn.style.color='#fff';
}
async function submitOnboard(userId,clientId){
  const addr=(document.getElementById('onb-addr')?.value||'').trim();
  const notes=(document.getElementById('onb-notes')?.value||'').trim();
  const callTime=window._onbCallTime||'';
  const errEl=document.getElementById('onb-addr-err');
  if(!addr){if(errEl){errEl.style.display='block';document.getElementById('onb-addr')?.focus();}return;}
  if(errEl)errEl.style.display='none';
  const btn=document.getElementById('onb-submit');
  if(btn){btn.textContent='Sending…';btn.disabled=true;}
  try{
    await _supa.from('inbound_leads').insert({
      source:'onboard_link',
      account_id:userId,
      client_id:clientId,
      addr,
      notes,
      call_time:callTime,
      status:'pending'
    });
    // Remember on this device so form doesn't re-appear
    try{localStorage.setItem('td_onb_done_'+clientId,'1');}catch(e){}
    // Show brief confirmation then transition to hub (or quote-in-progress)
    document.querySelector('.body-wrap').innerHTML=
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center">'+
      '<div style="font-size:64px;margin-bottom:20px">✅</div>'+
      '<div style="font-size:24px;font-weight:800;margin-bottom:10px">Got it!</div>'+

async function payBalance(bidId){
  const bid=_hub.bids.find(b=>b.id===bidId);if(!bid)return;
  const amount=Math.round((bid.balance||0)*100);
  if(amount<50){alert('No balance outstanding.');return;}
  const btn=document.getElementById('pay-btn-'+bidId)||document.getElementById('pay-inv-btn-'+bidId);
  if(btn){btn.textContent='Setting up…';btn.disabled=true;}
  try{
    const hubBase=location.href.split('#')[0];
    const res=await fetch(SUPA_URL+'/functions/v1/create-checkout',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({amount,currency:'usd',paymentMethod:'card',
        proposalKey:bid.proposalKey||null,clientName:_hub.clientName,
        businessName:_hub.contractorName,bidId:String(bid.id),
        contractorUserId:_hub.contractorUserId,notifyEmail:_hub.notifyEmail,
        successUrl:hubBase+'#paid-'+bid.id,cancelUrl:hubBase})
    });
    const d=await res.json();
    if(d.url){window.location.href=d.url;}
    else{if(btn){btn.textContent='Pay with card';btn.disabled=false;}alert('Could not create payment link. Please contact your contractor.');}
  }catch(e){if(btn){btn.textContent='Pay with card';btn.disabled=false;}}
}

async function openProposal(bidId){

    ct.innerHTML=(propData.proposalHtml||'<p style="color:#999;padding:20px">Proposal content not available.</p>')+
      '<div style="margin-top:40px;padding-top:20px;border-top:1px solid #e0e0dc;display:flex;gap:10px" class="no-print">'+
      '<button onclick="closeProp()" class="btn btn-sec" style="width:auto;padding:12px 24px">← Back to hub</button></div>';
  }catch(e){
    ct.innerHTML='<p style="color:#A32D2D;padding:20px;font-size:14px">Could not load proposal. Please contact your contractor.</p>'+
      '<button onclick="closeProp()" class="btn btn-sec" style="margin:0 20px 20px;width:auto;padding:12px 24px">← Back</button>';
  }
}
function closeProp(){document.getElementById('prop-overlay').style.display='none';}
function openPhoto(url,caption){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;cursor:pointer';
  ov.innerHTML='<img src="'+esc(url)+'" style="max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain">'+(caption?'<div style="color:#fff;font-size:13px;margin-top:12px;text-align:center">'+esc(caption)+'</div>':'');
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
}
init();
</script>
</body>
