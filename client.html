<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Project Hub</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@700;800;900&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1B1612;
  --navy:#1B3465;
  --denim:#2D5DA8;
  --green:#16a34a;
  --green-mid:#3B6D11;
  --green-lt:#EAF3DE;
  --green-border:#97C459;
  --red:#A32D2D;
  --red-lt:#FFF0F0;
  --border:#e0dfd8;
  --border2:#cccbc4;
  --text:#1a1a18;
  --text2:#5f5e5a;
  --text3:#9a9890;
  --bg:#F4F5F7;
  --bg-card:#fff;
  --r:10px;
  --rl:16px;
  --font-display:'Geist',system-ui,sans-serif;
  --font-ui:'Inter Tight',-apple-system,sans-serif;
}
body{font-family:var(--font-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif);background:var(--bg);color:var(--text);min-height:100vh}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--ink);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.topbar-logo-img{height:28px;max-width:100px;object-fit:contain;display:none;border-radius:4px;flex-shrink:0}
.topbar-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-display)}
.topbar-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-icon-btn{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:16px;line-height:1;cursor:pointer;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-family:inherit}
.topbar-icon-btn:hover{background:rgba(255,255,255,.14)}
.topbar-account-chip{display:flex;align-items:center;padding:4px 10px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:#fff;font-size:12px;font-weight:700;color:var(--ink);letter-spacing:-.1px;cursor:default;white-space:nowrap}

/* ── Layout ── */
.body-wrap{padding-top:52px;min-height:100vh}
.main-content{max-width:700px;margin:0 auto;padding:20px 16px 96px}

/* ── Left nav (desktop) ── */
.left-nav{width:220px;background:var(--bg-card);border-right:1px solid var(--border);overflow-y:auto;display:none;flex-direction:column}
.nav-client{padding:14px 18px 10px;border-bottom:1px solid var(--border);margin-bottom:4px}
.nav-client-name{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-client-addr{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:10px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:background .15s,color .15s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--bg);color:var(--ink);border-left-color:var(--ink)}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-footer{margin-top:auto;padding:14px 18px;font-size:10px;color:var(--text3)}

/* ── Bottom nav (mobile) ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;padding:10px 4px;font-family:inherit;-webkit-tap-highlight-color:transparent;border-top:2px solid transparent;transition:color .15s,border-color .15s}
.bn-item.active{color:var(--ink);border-top:2px solid var(--ink);padding-top:8px}
.bn-icon{font-size:22px;line-height:1}

@media(min-width:640px){
  .bottom-nav{display:none}
  .left-nav{display:flex;position:sticky;top:52px;height:calc(100vh - 52px)}
  .body-wrap{display:flex;align-items:flex-start}
  .main-content{flex:1;min-width:0;padding-bottom:40px}
}

/* ── Cards & shared ── */
.card{background:var(--bg-card);border-radius:var(--rl);padding:20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(27,22,18,.10),0 0 0 1px rgba(27,22,18,.05)}
.section-hdr{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-family:var(--font-display)}
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--ink);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-ui,inherit);text-align:center;text-decoration:none;transition:opacity .15s;box-shadow:0 2px 10px rgba(27,22,18,.2)}
.btn:active{opacity:.85}
.btn-green{background:#1D5C14;box-shadow:0 2px 10px rgba(29,92,20,.3)}
.btn-sec{background:transparent;color:var(--text2);border:1.5px solid var(--border2);font-size:13px;padding:11px;box-shadow:none}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.row:last-child{border-bottom:none;padding-bottom:0}
.rl{color:var(--text3)}.rv{font-weight:600;text-align:right}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-won{background:var(--green-lt);color:var(--green-mid)}
.empty{color:var(--text3);font-size:13px;text-align:center;padding:20px 0}
.view-title{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:18px;font-family:var(--font-display)}
.pg-status{text-align:center;padding:80px 20px}
.pg-status-icon{font-size:64px;margin-bottom:16px}
.pg-status h2{font-size:26px;font-weight:900;margin-bottom:10px;font-family:var(--font-display);letter-spacing:-.4px}
.pg-status p{font-size:14px;color:var(--text2);line-height:1.7;max-width:380px;margin:0 auto}

/* ── Hero ── */
.hub-hero{background:linear-gradient(155deg,var(--ink) 0%,#1B3465 100%);border-radius:16px;padding:22px 20px;margin-bottom:16px;display:flex;align-items:flex-start;gap:20px;position:relative;overflow:hidden}
.hub-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04)}
.hub-hero-l{flex:1;min-width:0;position:relative;z-index:1}
.hub-hero-eyebrow{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);margin-bottom:4px}
.hub-hero-greeting{font-size:38px;font-weight:900;font-family:var(--font-display);color:#fff;letter-spacing:-.8px;line-height:1;margin-bottom:4px}
.hub-hero-sub{font-size:13px;color:rgba(255,255,255,.55);font-weight:500;margin-bottom:3px}
.hub-hero-phone{font-size:12px;color:rgba(255,255,255,.4);text-decoration:none;display:block;margin-bottom:14px}
.hub-progress-row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.45);margin-bottom:5px;font-weight:600}
.hub-progress-track{height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
.hub-progress-fill{height:100%;background:var(--denim);border-radius:3px;box-shadow:0 0 10px rgba(45,93,168,.8)}
.hub-hero-r{display:flex;flex-direction:column;gap:8px;flex-shrink:0;position:relative;z-index:1}
.hub-mini{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;text-align:center;min-width:72px}
.hub-mini-val{font-size:20px;font-weight:900;font-family:var(--font-display);color:#fff;letter-spacing:-.5px;line-height:1;margin-bottom:2px}
.hub-mini-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4)}
@media(max-width:640px){
  .hub-hero{flex-direction:column}
  .hub-hero-r{flex-direction:row}
  .hub-mini{flex:1}
  .hub-hero-greeting{font-size:30px}
}

/* ── Pay CTA banner ── */
.hub-pay-cta{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#5C1A1A,#8B2B2B);border-radius:14px;padding:16px 18px;margin-bottom:14px;gap:14px}
.hub-pay-cta-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:3px}
.hub-pay-cta-amt{font-size:32px;font-weight:900;font-family:var(--font-display);color:#fff;letter-spacing:-1px;line-height:1}
.hub-pay-cta-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px}
.hub-pay-cta-r{flex-shrink:0}

/* ── Paid banner ── */
.hub-paid-banner{display:flex;align-items:center;gap:14px;background:var(--green-lt);border:1px solid var(--green-border);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.hub-paid-title{font-size:14px;font-weight:800;color:var(--green-mid)}
.hub-paid-sub{font-size:12px;color:var(--green-mid);margin-top:2px}

/* ── Two-col layout ── */
.hub-two-col{display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start}
.hub-col-main{min-width:0}
.hub-col-side{display:flex;flex-direction:column;gap:12px}
@media(max-width:640px){
  .hub-two-col{grid-template-columns:1fr}
  .hub-col-side{display:none}
}

/* ── Feed ── */
.hub-feed-hd{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;letter-spacing:-.1px}
.hub-feed-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.hub-feed-item:last-child{border-bottom:none}
.hub-feed-dot{width:8px;height:8px;border-radius:50%;background:var(--denim);flex-shrink:0;margin-top:4px}
.hub-feed-title{font-size:13px;font-weight:700;color:var(--text)}
.hub-feed-meta{font-size:11px;color:var(--text3);margin-top:2px}
.hub-feed-empty{font-size:13px;color:var(--text3);padding:10px 0}

/* ── Timeline ── */
.hub-timeline{display:flex;flex-direction:column;gap:0}
.hub-timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hub-timeline-item:last-child{border-bottom:none}
.hub-timeline-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--border2)}
.hub-timeline-dot.done{background:var(--green-mid)}
.hub-timeline-dot.active{background:var(--denim)}
.hub-timeline-body{flex:1;min-width:0}
.hub-timeline-title{font-size:13px;font-weight:700}
.hub-timeline-meta{font-size:11px;color:var(--text3);margin-top:2px}
.hub-timeline-status{display:flex;align-items:center;gap:8px;margin-top:6px}
.hub-timeline-amt{font-size:13px;font-weight:700;color:var(--text)}
.hub-badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.hub-badge-paid{background:var(--green-lt);color:var(--green-mid)}
.hub-badge-due{background:#FEF3C7;color:#92400E}

/* ── Sidebar cards ── */
.hub-side-card{background:var(--bg-card);border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(27,22,18,.08),0 0 0 1px rgba(27,22,18,.05)}
.hub-side-hd{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
.hub-contact-btn{display:block;padding:10px 14px;border-radius:10px;background:var(--ink);color:#fff;font-size:13px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:8px;font-family:inherit}
.hub-contact-btn-sec{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.hub-approval-item{padding:8px 0;border-bottom:1px solid var(--border)}
.hub-approval-item:last-child{border-bottom:none}
.hub-approval-name{font-size:13px;font-weight:700}
.hub-approval-amt{font-size:11px;color:var(--text3)}
.hub-approval-link{font-size:12px;font-weight:700;color:var(--denim);text-decoration:none;display:block;margin-top:4px}

/* ── Bid rows ── */
.hub-bid-row{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(27,22,18,.08),0 0 0 1px rgba(27,22,18,.06)}
.hub-bid-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hub-bid-name{font-size:15px;font-weight:700}
.hub-bid-date{font-size:12px;color:var(--text3);margin-top:2px}
.hub-bid-amt{font-size:26px;font-weight:900;font-family:var(--font-display);color:var(--denim);letter-spacing:-.7px;flex-shrink:0;margin-left:10px}
.hub-bid-pending-msg{font-size:12px;color:var(--text3);margin-top:4px}
.hub-btn{display:block;padding:13px 16px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;text-align:center}
.hub-btn-sign{background:var(--ink);color:#fff;box-shadow:0 2px 10px rgba(27,22,18,.2)}

/* ── Project tab ── */
.hub-photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px}
@media(max-width:640px){.hub-photo-grid{grid-template-columns:repeat(2,1fr)}}
.hub-photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg);cursor:pointer;position:relative}
.hub-photo-thumb img{width:100%;height:100%;object-fit:cover}
.hub-photo-tag{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.hub-log-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px}
.hub-log-item:last-child{border-bottom:none}
.hub-log-dot{width:10px;height:10px;border-radius:50%;background:var(--denim);flex-shrink:0;margin-top:3px}
.hub-log-body{flex:1}
.hub-log-date{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:3px}
.hub-log-text{font-size:13px;font-weight:700;color:var(--text)}

/* ── Payments tab ── */
.hub-balance-card{background:linear-gradient(135deg,var(--ink) 0%,#2D2826 100%);border-radius:16px;padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.hub-balance-card::before{content:'';position:absolute;right:-40px;top:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04)}
.hub-balance-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.45);margin-bottom:4px;position:relative;z-index:1}
.hub-balance-amt{font-size:44px;font-weight:900;font-family:var(--font-display);color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:14px;position:relative;z-index:1}
.hub-method-chips{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1;margin-bottom:14px}
.hub-method-chip{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.15)}
.hub-milestone{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hub-milestone:last-child{border-bottom:none}
.hub-milestone-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--border2)}
.hub-milestone-dot.paid{background:var(--green-mid)}
.hub-milestone-dot.due{background:#D97706}
.hub-milestone-dot.upcoming{background:var(--border2)}
.hub-milestone-body{flex:1}
.hub-milestone-name{font-size:13px;font-weight:700}
.hub-milestone-date{font-size:11px;color:var(--text3);margin-top:1px}
.hub-milestone-amt{font-size:13px;font-weight:700;min-width:70px;text-align:right}
.hub-inv-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.hub-inv-table th{text-align:left;padding:8px 10px;background:var(--bg);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border)}
.hub-inv-table td{padding:9px 10px;border-bottom:1px solid var(--border)}
.hub-inv-table tr:last-child td{border-bottom:none}
.hub-inv-table .amt{text-align:right;font-weight:600}

/* ── Documents tab ── */
.hub-doc-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hub-doc-item:last-child{border-bottom:none}
.hub-doc-icon{width:38px;height:38px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hub-doc-body{flex:1;min-width:0}
.hub-doc-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.hub-doc-meta{font-size:11px;color:var(--text3);margin-top:2px}
.hub-doc-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;margin-left:6px}
.hub-doc-tag-contract{background:#EEF2FF;color:#4338CA}
.hub-doc-tag-invoice{background:var(--green-lt);color:var(--green-mid)}
.hub-doc-tag-epa{background:#FEF3C7;color:#92400E}
.hub-doc-tag-proposal{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}
.hub-contractor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.hub-contractor-cell{background:var(--bg);border-radius:10px;padding:12px 14px}
.hub-contractor-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
.hub-contractor-val{font-size:13px;font-weight:700;color:var(--text)}

/* ── Messages tab ── */
.hub-chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 240px);min-height:300px}
.hub-chat-messages{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px}
.hub-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.hub-msg-client{align-self:flex-end;background:var(--denim);color:#fff;border-radius:14px 14px 4px 14px}
.hub-msg-contractor{align-self:flex-start;background:#F0EDE8;color:var(--text);border-radius:14px 14px 14px 4px}
.hub-msg-time{font-size:10px;opacity:.6;margin-top:4px}
.hub-chat-input{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border)}
.hub-chat-input input{flex:1;padding:11px 14px;border-radius:22px;border:1.5px solid var(--border2);font-size:14px;font-family:inherit;outline:none;background:#fff}
.hub-chat-input input:focus{border-color:var(--ink)}
.hub-chat-send{padding:11px 18px;border-radius:22px;background:var(--ink);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}

/* ── Invoice overlay ── */
#inv-overlay{position:fixed;inset:0;background:#fff;z-index:500;overflow-y:auto;display:none}
.inv-wrap{max-width:680px;margin:0 auto;padding:32px 24px 60px}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:24px;border-bottom:3px solid var(--denim)}
.inv-co-name{font-size:24px;font-weight:800;color:var(--denim);font-family:var(--font-display)}
.inv-co-sub{font-size:12px;color:#666;margin-top:4px}
.inv-title-block{text-align:right}
.inv-title-block h1{font-size:32px;font-weight:800;color:#1a1a18;letter-spacing:-.02em}
.inv-title-num{font-size:12px;color:#666;margin-top:4px}
.inv-two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.inv-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:6px}
.inv-client-name{font-size:16px;font-weight:700}
.inv-detail{font-size:13px;color:#444;margin-top:2px;line-height:1.5}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table th{text-align:left;padding:8px 10px;background:#f5f5f3;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#666;border-bottom:1px solid #e0e0dc}
.inv-table td{padding:10px;border-bottom:1px solid #f0eeec;font-size:13px;vertical-align:top}
.inv-table td.amt{text-align:right;font-weight:600}
.inv-totals{margin-left:auto;width:260px}

async function init(){
  const p=new URLSearchParams(location.search);
  const t=p.get('t'),u=p.get('u'),c=p.get('c'),mode=p.get('mode');
  if(mode==='onboard'){initOnboard(t,u,c);return;}
  if(!t||!u||!c){showState('err');return;}
  try{
    const key='client-hub/'+u+'/'+c+'_'+t+'.json';
    const{data,error}=await _supa.storage.from('proposals').download(key);
    if(error||!data){
      // Hub JSON not ready yet — check if they completed onboarding on this device
      const p2=new URLSearchParams(location.search);
      const cid=p2.get('c');
      if(cid&&localStorage.getItem('td_onb_done_'+cid)){showQuoteInProgress(null);return;}
      showState('err');return;
    }
    _hub=JSON.parse(await data.text());
    const bidIds=_hub.bids.map(b=>String(b.id));
    if(u&&bidIds.length){
      try{
        const{data:sigs}=await _supa.from('signed_proposals')
          .select('bid_id,payment_status,payment_method,signed_at,deposit')
          .eq('contractor_user_id',u).in('bid_id',bidIds);
        if(sigs)sigs.forEach(sp=>{
          const bid=_hub.bids.find(b=>String(b.id)===sp.bid_id);
          if(!bid)return;
          if(bid.status==='Pending'){
            bid.status='Closed Won';bid.signedAt=sp.signed_at;bid.paymentStatus=sp.payment_status;
          }
          if(sp.payment_status==='paid'){
            const amtPaid=sp.deposit||bid.deposit||0;
            bid.paid=Math.min(bid.amount||0,(bid.paid||0)+amtPaid);
            bid.balance=Math.max(0,(bid.balance||0)-amtPaid);
            bid.paymentStatus='paid';
          }
        });
      }catch(e){console.warn('sig check:',e);}
    }
    applyBranding(_hub);renderAll();

}

    document.title=(_hub.contractorName||'Your Contractor')+' — Get a Quote';
  }else{

    '</div>'+
    '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rl);padding:20px">'+
      '<div style="margin-bottom:16px">'+
        '<label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:block;margin-bottom:6px">Property address</label>'+
        '<div style="position:relative;margin-bottom:8px">'+
          '<input id="onb-street" type="text" placeholder="Start typing address…" autocomplete="off" style="width:100%;box-sizing:border-box;padding:13px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:16px;font-family:inherit;background:var(--bg-card);color:var(--text)" oninput="_onbAddrSearch(this.value)" onblur="setTimeout(()=>{const b=document.getElementById(\'onb-addr-sugg\');if(b)b.style.display=\'none\'},150)">'+
          '<div id="onb-addr-sugg" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--bg-card);border:1.5px solid var(--border2);border-radius:var(--r);box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:200;max-height:240px;overflow-y:auto"></div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 56px 90px;gap:8px;margin-bottom:0">'+
          '<input id="onb-city" type="text" placeholder="City" autocomplete="address-level2" style="width:100%;box-sizing:border-box;padding:13px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:16px;font-family:inherit;background:var(--bg-card);color:var(--text)">'+
          '<input id="onb-state" type="text" placeholder="ST" maxlength="2" autocomplete="address-level1" style="width:100%;box-sizing:border-box;padding:13px 10px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:16px;font-family:inherit;background:var(--bg-card);color:var(--text);text-align:center;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">'+

          '<button type="button" onclick="onbTime(this,\'Morning\')" style="flex:1;padding:11px 6px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)">Morning</button>'+

const _ONB_STATE_ABBR={'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA','Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA','Hawaii':'HI','Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA','Kansas':'KS','Kentucky':'KY','Louisiana':'LA','Maine':'ME','Maryland':'MD','Massachusetts':'MA','Michigan':'MI','Minnesota':'MN','Mississippi':'MS','Missouri':'MO','Montana':'MT','Nebraska':'NE','Nevada':'NV','New Hampshire':'NH','New Jersey':'NJ','New Mexico':'NM','New York':'NY','North Carolina':'NC','North Dakota':'ND','Ohio':'OH','Oklahoma':'OK','Oregon':'OR','Pennsylvania':'PA','Rhode Island':'RI','South Carolina':'SC','South Dakota':'SD','Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT','Virginia':'VA','Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY','District of Columbia':'DC'};
let _onbAddrTimer=null;
function _onbAddrSearch(val){
  clearTimeout(_onbAddrTimer);
  const box=document.getElementById('onb-addr-sugg');if(!box)return;
  if(val.length<3){box.style.display='none';return;}
  _onbAddrTimer=setTimeout(async()=>{
    try{
      const r=await fetch('https://photon.komoot.io/api/?q='+encodeURIComponent(val)+'&limit=6&lang=en');
      const d=await r.json();
      if(!d?.features?.length){box.style.display='none';return;}
      box.innerHTML=d.features.filter(f=>{const p=f.properties||{};return p.housenumber&&p.street&&(p.city||p.town||p.village);}).slice(0,5).map(f=>{
        const p=f.properties||{};
        const streetLine=(p.housenumber?p.housenumber+' ':'')+p.street;
        const city=p.city||p.town||p.village||'';
        const state=_ONB_STATE_ABBR[p.state]||p.state||'';
        const zip=p.postcode||'';
        const s1=streetLine.replace(/'/g,"\\'");const s2=city.replace(/'/g,"\\'");const s3=state.replace(/'/g,"\\'");const s4=zip.replace(/'/g,"\\'");
        return '<div onmousedown="event.preventDefault()" onclick="_onbAddrSelect(\''+s1+'\',\''+s2+'\',\''+s3+'\',\''+s4+'\')" style="padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer">'+
          '<div style="font-size:14px;font-weight:600">'+streetLine.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>'+
          '<div style="font-size:12px;color:#888;margin-top:1px">'+[city,state,zip].filter(Boolean).join(' ').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>'+
        '</div>';
      }).join('');
      box.style.display=box.innerHTML?'block':'none';
    }catch(e){if(box)box.style.display='none';}
  },220);
}
function _onbAddrSelect(street,city,state,zip){
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  set('onb-street',street);set('onb-city',city);set('onb-state',state);set('onb-zip',zip);
  const box=document.getElementById('onb-addr-sugg');if(box)box.style.display='none';
}
function onbTime(btn,val){
  window._onbCallTime=val;
  document.querySelectorAll('#onb-time-btns button').forEach(b=>{
    b.style.background='var(--bg)';b.style.borderColor='var(--border2)';b.style.color='var(--text)';
  });
  btn.style.background='var(--ink)';btn.style.borderColor='var(--ink)';btn.style.color='#fff';
}
async function submitOnboard(userId,clientId){
  const street=(document.getElementById('onb-street')?.value||'').trim();
  const city=(document.getElementById('onb-city')?.value||'').trim();
  const state=(document.getElementById('onb-state')?.value||'').trim().toUpperCase();
  const zip=(document.getElementById('onb-zip')?.value||'').trim();
  const addr=[street,city,[state,zip].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  const notes=(document.getElementById('onb-notes')?.value||'').trim();
  const callTime=window._onbCallTime||'';
  const errEl=document.getElementById('onb-addr-err');
  if(!street||!city){if(errEl){errEl.style.display='block';document.getElementById('onb-street')?.focus();}return;}
  if(errEl)errEl.style.display='none';
  const btn=document.getElementById('onb-submit');
  if(btn){btn.textContent='Sending…';btn.disabled=true;}
  try{
    await _supa.from('inbound_leads').insert({
      source:'onboard_link',
      account_id:userId,
      client_id:clientId,
      addr,
      street,
      city,
      state,
      zip,
      notes,
      call_time:callTime,
      status:'pending'
    });
    // Remember on this device so form doesn't re-appear
    try{localStorage.setItem('td_onb_done_'+clientId,'1');}catch(e){}
    // Show brief confirmation then transition to hub (or quote-in-progress)
    document.querySelector('.body-wrap').innerHTML=
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center">'+
      '<div style="font-size:64px;margin-bottom:20px">✅</div>'+
      '<div style="font-size:24px;font-weight:800;margin-bottom:10px">Got it!</div>'+
      '<div style="font-size:15px;color:var(--text2);line-height:1.7;max-width:340px">'+esc(_hub?.contractorName||'Your contractor')+' is preparing your quote.</div>'+
      '</div>';
    // Redirect to hub view after short delay
    const hubUrl=new URL(location.href);hubUrl.searchParams.delete('mode');
    setTimeout(()=>{location.href=hubUrl.toString();},2000);
  }catch(e){
    if(btn){btn.textContent='Send my details →';btn.disabled=false;}
    alert('Something went wrong — please try again or contact us directly.');
  }
}
function showQuoteInProgress(h){
  const name=h?.contractorName||'Your contractor';
  const phone=h?.contractorPhone||'';
  document.getElementById('pg-hub').innerHTML=
    '<div class="pg-status" style="display:block">'+

const _VIEWS=['overview','project','payments','documents','messages'];
const _BN=['overview','project','payments','documents','messages'];
function switchView(key){
  _activeView=key;
  _VIEWS.forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(v===key){
      el.style.opacity='0';el.style.transform='translateY(10px)';el.style.transition='';
      el.style.display='block';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.transition='opacity .22s ease,transform .22s ease';
        el.style.opacity='1';el.style.transform='translateY(0)';
      }));
    }else{el.style.display='none';el.style.opacity='';el.style.transform='';el.style.transition='';}
    const ni=document.getElementById('ni-'+v);if(ni)ni.className='nav-item'+(v===key?' active':'');
  });
  _BN.forEach(v=>{const bi=document.getElementById('bni-'+v);if(bi)bi.className='bn-item'+(v===key?' active':'');});
  history.replaceState(null,'',location.pathname+location.search+(key!=='overview'?'#'+key:''));
  window.scrollTo(0,0);
}

/* ── renderOverview ── */
function renderOverview(){
  if(!_hub)return;
  const h=_hub;
  const pendingBids=h.bids.filter(b=>b.status==='Pending');
  const wonBids=h.bids.filter(b=>b.status==='Closed Won');
  const totalBalance=wonBids.reduce((s,b)=>s+(b.balance||0),0);
  const totalPaid=wonBids.reduce((s,b)=>s+(b.paid||0),0);
  const activeJobs=h.jobs.filter(j=>j.status!=='done');
  const payableBids=wonBids.filter(b=>(b.balance||0)>0.01);

  const total=h.bids.length||1;
  const signed=wonBids.length;

  html+='</div>';
  // Mini stats
  html+='<div class="hub-hero-r">';

  html+='<div class="hub-mini"><div class="hub-mini-val">'+(totalBalance>0.01?fmt(totalBalance):'$0')+'</div><div class="hub-mini-lbl">Balance</div></div>';

  html+='</div>';

  if(payableBids.length){
    const bid=payableBids[0];

  // Two-col layout
  html+='<div class="hub-two-col">';

  // Feed: daily updates

    html+='</div>';
  }

  // Approvals needing signature
  if(pendingBids.length){
    html+='<div class="hub-side-card">';
    html+='<div class="hub-side-hd">Needs approval</div>';
    pendingBids.forEach(b=>{
      html+='<div class="hub-approval-item">';

  html+='</div>'; // end col-side

/* ── renderPayments ── */
function renderPayments(){
  if(!_hub)return;
  const h=_hub;
  const wonBids=h.bids.filter(b=>b.status==='Closed Won');
  let html='<div class="view-title">Payments</div>';

  if(!wonBids.length){
    html+='<div class="card"><div class="empty">No invoices yet. Payments will appear here once a proposal is signed.</div></div>';
    document.getElementById('view-payments').innerHTML=html;return;
  }

  wonBids.forEach(bid=>{
    const balance=bid.balance||0;
    const isPaid=balance<0.01;
    const bidPmts=h.payments.filter(p=>p.bid_id===bid.id||(!p.bid_id&&h.bids.length===1));
    const deposit=bid.deposit||0;
    const depPaid=(bid.paid||0)>=(deposit-0.01);

    // Balance card
    html+='<div class="hub-balance-card">';
    html+='<div class="hub-balance-lbl" style="position:relative;z-index:1">'+(bid.type||'Project')+'</div>';
    html+='<div class="hub-balance-amt">'+fmt(balance)+'</div>';
    html+='<div class="hub-method-chips">';
    html+='<div class="hub-method-chip">💳 Card</div>';
    html+='<div class="hub-method-chip">🏦 ACH</div>';
    html+='<div class="hub-method-chip">💵 Cash</div>';
    html+='</div>';
    if(!isPaid){
      const pb=_payBtn(bid,h);
      if(pb)html+='<div style="position:relative;z-index:1">'+pb+'</div>';
    }else{
      html+='<div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.7);position:relative;z-index:1">✅ Paid in full</div>';
    }
    html+='</div>';

    // Payment schedule
    html+='<div class="card">';
    html+='<div class="hub-feed-hd">Payment schedule</div>';
    // Deposit milestone
    if(deposit>0.01){
      html+='<div class="hub-milestone">';
      html+='<div class="hub-milestone-dot '+(depPaid?'paid':'due')+'"></div>';
      html+='<div class="hub-milestone-body"><div class="hub-milestone-name">Deposit</div><div class="hub-milestone-date">'+(depPaid?'Paid':'Due upon signing')+'</div></div>';
      html+='<div class="hub-milestone-amt">'+fmt(deposit)+'</div>';
      html+='</div>';
    }
    // Final balance
    const finalAmt=(bid.amount||0)-(deposit||0);
    if(finalAmt>0.01||deposit<0.01){
      html+='<div class="hub-milestone">';
      html+='<div class="hub-milestone-dot '+(isPaid?'paid':(depPaid?'due':'upcoming'))+'"></div>';
      html+='<div class="hub-milestone-body"><div class="hub-milestone-name">Final balance</div><div class="hub-milestone-date">'+(isPaid?'Paid':'Due upon completion')+'</div></div>';
      html+='<div class="hub-milestone-amt">'+fmt(deposit>0.01?finalAmt:(bid.amount||0))+'</div>';
      html+='</div>';
    }
    html+='</div>';

    // Payment history
    if(bidPmts.length){
      html+='<div class="card">';
      html+='<div class="hub-feed-hd">Payment history</div>';
      html+='<table class="hub-inv-table"><thead><tr><th>Date</th><th>Type</th><th class="amt">Amount</th></tr></thead><tbody>';
      const tl={deposit:'Deposit',final:'Final payment',stripe:'Online payment',card:'Card payment',check:'Check',cash:'Cash',ach:'Bank transfer'};
      bidPmts.filter(p=>p.amount>0).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(p=>{
        html+='<tr><td>'+esc(fmtDate(p.date))+'</td><td>'+esc(tl[p.type]||p.type||'Payment')+'</td><td class="amt" style="color:var(--green-mid)">'+fmt(p.amount)+'</td></tr>';
      });
      html+='</tbody></table>';
      html+='</div>';
    }
  });

  document.getElementById('view-payments').innerHTML=html;
}

    html+='<div class="hub-bid-row"><div class="hub-bid-top">';
    html+='<div><div class="hub-bid-name">'+esc(b.type||'Services')+'</div>';
    html+='<div class="hub-bid-date">'+(job&&job.completion_date?'Completed '+fmtDate(job.completion_date):b.bid_date?'Job from '+fmtDate(b.bid_date):'')+'</div></div>';
    html+='<div style="font-size:18px;font-weight:800;flex-shrink:0;margin-left:10px;color:'+(isPaid?'var(--green-mid)':'var(--red)')+'">'+fmt(b.amount)+'</div></div>';
    html+='<div style="margin-bottom:10px"><span class="badge" style="background:'+(isPaid?'var(--green-lt)':'var(--red-lt)')+';color:'+(isPaid?'var(--green-mid)':'var(--red)')+'">'+( isPaid?'Paid in full':'Balance: '+fmt(b.balance))+'</span></div>';
    if(!isPaid)html+=_payBtn(b,_hub);
    html+='<button onclick="openInvoice('+b.id+')" class="btn btn-sec">📄 View Invoice</button></div>';
  });
  const el=document.getElementById('view-invoices');if(el)el.innerHTML=html;
}

let _stripeCheckoutInstance=null;
async function _launchCheckout(bidId,amount,label){
  const bid=_hub.bids.find(b=>b.id===bidId);if(!bid)return;
  const btn=document.getElementById('pay-btn-'+bidId)||document.getElementById('pay-inv-btn-'+bidId);
  if(btn){btn.textContent='Setting up…';btn.disabled=true;}
  try{
    const hubBase=location.href.split('#')[0];
    const res=await fetch(SUPA_URL+'/functions/v1/create-checkout',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY},
      body:JSON.stringify({amount,currency:'usd',paymentMethod:'card',
        proposalKey:bid.proposalKey||null,clientName:_hub.clientName,
        businessName:_hub.contractorName,bidId:String(bid.id),
        contractorUserId:_hub.contractorUserId,notifyEmail:_hub.notifyEmail,
        successUrl:hubBase+'#paid-'+bid.id,cancelUrl:hubBase,
        embedded:true})
    });
    const d=await res.json();
    if(btn){btn.textContent=label;btn.disabled=false;}
    if(d.clientSecret&&d.publishableKey){
      document.getElementById('stripe-modal-biz').textContent=_hub.contractorName||'Secure Payment';
      document.getElementById('stripe-modal-amt').textContent='Amount: '+fmt(amount/100)+' · Secured by Stripe';
      document.getElementById('checkout-embed-container').innerHTML='';
      document.getElementById('stripe-overlay').style.display='block';
      document.body.style.overflow='hidden';
      const stripe=Stripe(d.publishableKey);
      _stripeCheckoutInstance=await stripe.initEmbeddedCheckout({
        clientSecret:d.clientSecret,
        onComplete:()=>{closePaymentModal();showPaymentSuccess(bidId);}
      });
      _stripeCheckoutInstance.mount('#checkout-embed-container');
    }else{
      alert('Could not set up payment. Please contact us directly.');
    }
  }catch(e){if(btn){btn.textContent=label;btn.disabled=false;}}
}
function closePaymentModal(){
  if(_stripeCheckoutInstance){_stripeCheckoutInstance.destroy();_stripeCheckoutInstance=null;}
  const ov=document.getElementById('stripe-overlay');
  if(ov)ov.style.display='none';
  document.body.style.overflow='';
}
async function payBalance(bidId){
  const bid=_hub.bids.find(b=>b.id===bidId);if(!bid)return;
  const amount=Math.round((bid.balance||0)*100);
  if(amount<50){alert('No balance outstanding.');return;}
  await _launchCheckout(bidId,amount,'Pay balance');
}
async function payDeposit(bidId){
  const bid=_hub.bids.find(b=>b.id===bidId);if(!bid)return;
  const amount=Math.round((bid.deposit||0)*100);
  if(amount<50){alert('No deposit amount found.');return;}
  await _launchCheckout(bidId,amount,'Pay deposit');
}
function _payBtn(bid,h){
  if(!h.stripeEnabled||(bid.balance||0)<0.01)return '';
  const depositPaid=(bid.paid||0)>=(bid.deposit||0)-0.01;
  if(!depositPaid&&(bid.deposit||0)>0.01){
    const fullBtn=(bid.balance||0)>(bid.deposit||0)+0.01
      ?'<button onclick="payBalance('+bid.id+')" class="btn btn-sec" style="margin-top:6px;font-size:13px">💳 Pay '+fmt(bid.balance)+' in full instead</button>'
      :'';
    return '<button id="pay-btn-'+bid.id+'" onclick="payDeposit('+bid.id+')" class="btn" style="background:#635BFF;margin-bottom:2px">💳 Pay '+fmt(bid.deposit)+' deposit</button>'+fullBtn;
  }
  return '<button id="pay-btn-'+bid.id+'" onclick="payBalance('+bid.id+')" class="btn" style="background:#635BFF;margin-bottom:8px">💳 Pay '+fmt(bid.balance)+' balance</button>';
}
function showPaymentSuccess(bidId){
  const bid=_hub.bids.find(b=>b.id===bidId);
  const banner=document.createElement('div');
  banner.style.cssText='position:fixed;top:60px;left:0;right:0;z-index:300;background:#16a34a;color:#fff;padding:14px 20px;text-align:center;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.2)';
  banner.textContent='✅ Payment received — thank you! We\'ll be in touch.';
  document.body.appendChild(banner);setTimeout(()=>banner.remove(),6000);
  if(bid){bid.paymentStatus='paid';bid.balance=0;renderAll();}
}
function openInvoice(bidId){
  const h=_hub,bid=h.bids.find(b=>b.id===bidId);if(!bid)return;
  const job=h.jobs.find(j=>j.bid_id===bidId);
  const bidPayments=h.payments.filter(p=>p.bid_id===bidId||(!p.bid_id&&h.bids.length===1));
  const totalPaid=bidPayments.filter(p=>p.amount>0).reduce((s,p)=>s+p.amount,0);
  const balance=Math.max(0,(bid.amount||0)-totalPaid),isPaid=balance<0.01;
  const invNum='INV-'+String(bidId).slice(-6).toUpperCase();
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const tl={deposit:'Deposit',final:'Final payment',stripe:'Online payment',card:'Card payment',check:'Check',cash:'Cash',ach:'Bank transfer'};
  const bdBg=isPaid?'#F0FBF0':'#FFF8F0',bdBrd=isPaid?'#63B841':'#E89A3C',bdClr=isPaid?'#3B8C2A':'#B8600A';
  let html='<div class="inv-header"><div><div class="inv-co-name">'+esc(h.contractorName)+'</div>';
  if(h.contractorPhone)html+='<div class="inv-co-sub">'+esc(h.contractorPhone)+'</div>';
  html+='</div><div class="inv-title-block"><h1>INVOICE</h1><div class="inv-title-num">'+invNum+'</div><div class="inv-title-num">'+today+'</div></div></div>';
  html+='<div class="inv-two-col"><div><div class="inv-section-label">Bill to</div><div class="inv-client-name">'+esc(h.clientName)+'</div>';
  if(h.clientAddr)html+='<div class="inv-detail">'+esc(h.clientAddr)+'</div>';
  if(h.clientPhone)html+='<div class="inv-detail">'+esc(h.clientPhone)+'</div>';
  html+='</div><div><div class="inv-section-label">Job details</div>';
  html+='<div class="inv-detail"><strong>Type:</strong> '+esc(bid.type||'Services')+'</div>';
  if(bid.bid_date)html+='<div class="inv-detail"><strong>Bid date:</strong> '+esc(bid.bid_date)+'</div>';
  if(job&&job.completion_date)html+='<div class="inv-detail"><strong>Completed:</strong> '+fmtDate(job.completion_date)+'</div>';
  html+='</div></div>';
  html+='<table class="inv-table"><thead><tr><th>Description</th><th style="text-align:right">Amount</th></tr></thead><tbody>';
  html+='<tr><td>'+esc(bid.type||'Professional services')+'<br><span style="font-size:11px;color:#666">'+esc(h.clientAddr||'')+'</span></td><td class="amt">'+fmt(bid.amount)+'</td></tr>';
  html+='</tbody></table>';
  html+='<div class="inv-totals"><div class="inv-total-row"><span>Subtotal</span><span>'+fmt(bid.amount)+'</span></div>';
  bidPayments.filter(p=>p.amount>0).forEach(p=>{
    html+='<div class="inv-total-row" style="color:#3B8C2A"><span>Payment ('+esc(p.date||'')+') — '+esc(tl[p.type]||p.type||'Payment')+'</span><span>('+fmt(p.amount)+')</span></div>';
  });
  html+='<div class="inv-total-row inv-total-grand"><span>Balance due</span><span>'+fmt(balance)+'</span></div></div>';
  html+='<div style="background:'+bdBg+';border:2px solid '+bdBrd+';border-radius:8px;padding:16px 20px;margin-top:24px;display:flex;justify-content:space-between;align-items:center">';
  html+='<div><div style="font-size:12px;font-weight:700;color:'+bdClr+';text-transform:uppercase;letter-spacing:.05em">'+(isPaid?'Paid in full ✓':'Balance due')+'</div>';
  html+='<div style="font-size:11px;color:'+bdClr+';margin-top:3px">'+(isPaid?'Thank you for your business!':'Please remit payment at your earliest convenience')+'</div>';
  if(!isPaid&&h.stripeEnabled)html+='<button id="pay-inv-btn-'+bid.id+'" onclick="payBalance('+bid.id+')" style="margin-top:10px;background:#635BFF;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">💳 Pay with card</button>';
  html+='</div><div style="font-size:28px;font-weight:800;color:'+bdClr+'">'+fmt(balance)+'</div></div>';
  html+='<div class="inv-footer-text">'+esc(h.contractorName)+' · '+(h.contractorPhone?esc(h.contractorPhone)+' · ':'')+'Thank you for choosing us!</div>';
  html+='<div style="margin-top:40px;padding-top:20px;border-top:1px solid #e0e0dc;display:flex;gap:10px" class="no-print">';
  html+='<button onclick="window.print()" class="btn" style="width:auto;flex:1;padding:12px">⬇ Save as PDF</button>';
  html+='<button onclick="closeInvoice()" class="btn btn-sec" style="width:auto;flex:1">Close</button></div>';
  document.getElementById('inv-content').innerHTML=html;
  const _invOv=document.getElementById('inv-overlay');
  _invOv.style.opacity='0';_invOv.style.display='block';
  requestAnimationFrame(()=>{_invOv.style.opacity='1';});
  history.replaceState(null,'','#invoice-'+bidId);scrollTo(0,0);
}
function closeInvoice(){
  const _ov=document.getElementById('inv-overlay');
  _ov.style.opacity='0';setTimeout(()=>_ov.style.display='none',250);
  history.replaceState(null,'',''+location.pathname+location.search);
}
async function openProposal(bidId){
  const bid=_hub.bids.find(b=>b.id===bidId);
  if(!bid||!bid.proposalKey){alert('Proposal document not available. Please contact us.');return;}
  const ov=document.getElementById('prop-overlay'),ct=document.getElementById('prop-content');
  ct.innerHTML='<div style="text-align:center;padding:60px 20px;color:#999;font-size:16px">Loading proposal…</div>';
  ov.style.opacity='0';ov.style.display='block';requestAnimationFrame(()=>ov.style.opacity='1');scrollTo(0,0);
  try{
    const{data,error}=await _supa.storage.from('proposals').download(bid.proposalKey);
    if(error||!data)throw new Error('not found');
    const propData=JSON.parse(await data.text());
    ct.innerHTML=(propData.proposalHtml||'<p style="color:#999;padding:20px">Proposal content not available.</p>')+
      '<div style="margin-top:40px;padding-top:20px;border-top:1px solid #e0e0dc;display:flex;gap:10px" class="no-print">'+
      '<button onclick="closeProp()" class="btn btn-sec" style="width:auto;padding:12px 24px">← Back to hub</button></div>';
  }catch(e){
    ct.innerHTML='<p style="color:#A32D2D;padding:20px;font-size:14px">Could not load proposal. Please contact us.</p>'+
      '<button onclick="closeProp()" class="btn btn-sec" style="margin:0 20px 20px;width:auto;padding:12px 24px">← Back</button>';
  }
}
function closeProp(){const _ov=document.getElementById('prop-overlay');_ov.style.opacity='0';setTimeout(()=>_ov.style.display='none',250);}
function openPhoto(url,caption){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;cursor:pointer';
  ov.innerHTML='<img src="'+esc(url)+'" style="max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain">'+(caption?'<div style="color:#fff;font-size:13px;margin-top:12px;text-align:center">'+esc(caption)+'</div>':'');
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
}
init();
// Re-check signed status when returning from sign.html via browser back / bfcache restore
async function _recheckSigned(){
  if(!_hub||!_supa)return;
  const u=new URLSearchParams(location.search).get('u');
  if(!u)return;
  const bidIds=_hub.bids.map(b=>String(b.id));
  if(!bidIds.length)return;
  try{
    const{data:sigs}=await _supa.from('signed_proposals')
      .select('bid_id,payment_status,payment_method,signed_at')
      .eq('contractor_user_id',u).in('bid_id',bidIds);
    if(!sigs)return;
    let changed=false;
    sigs.forEach(sp=>{
      const bid=_hub.bids.find(b=>String(b.id)===sp.bid_id);
      if(bid&&bid.status==='Pending'){bid.status='Closed Won';bid.signedAt=sp.signed_at;changed=true;}
    });
    if(changed)renderAll();
  }catch(e){}
}
window.addEventListener('pageshow',e=>{
  if(e.persisted){_recheckSigned();return;}
  // Fresh load: init() handles it, but schedule a safety re-check 3s later
  // in case sign.html's write hadn't propagated when init() queried.
  setTimeout(_recheckSigned,3000);
});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')_recheckSigned();});
</script>
