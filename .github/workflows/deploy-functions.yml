name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  # Allow manual deploys from the GitHub Actions UI (Actions → Deploy Supabase → Run workflow)
  workflow_dispatch:

# The paths: filter is the authoritative gate for push events — if this workflow
# triggered, those paths changed. Per-job if: conditions using
# github.event.commits.*.modified were unreliable for PR merge commits
# (GitHub doesn't populate those arrays) and caused jobs to skip silently.

jobs:
  deploy-migrations:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-functions:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
