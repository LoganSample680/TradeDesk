name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  deploy-migrations:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    # Only run when migration files changed.
    if: >
      contains(join(github.event.commits.*.modified, ','), 'supabase/migrations/')
      || contains(join(github.event.commits.*.added, ','), 'supabase/migrations/')
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-functions:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    # Only run when function files changed.
    if: >
      contains(join(github.event.commits.*.modified, ','), 'supabase/functions/')
      || contains(join(github.event.commits.*.added, ','), 'supabase/functions/')
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
