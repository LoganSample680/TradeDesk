name: E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright 1.56
        # Pin to 1.56.0 — matches local dev setup and the browser revisions
        # already validated. Bump here when upgrading Playwright.
        run: npm install --no-save @playwright/test@1.56.0 serve

      - name: Install Playwright browsers (WebKit + Chromium)
        run: npx playwright install --with-deps webkit chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      # Upload the full HTML report on EVERY run (pass or fail).
      # This lets Claude read exactly which tests failed, which were flaky
      # (passed on retry), and the full trace/video for each.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Upload raw test results (traces, screenshots, videos) on failure.
      # Playwright traces open in https://trace.playwright.dev for step-by-step replay.
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
