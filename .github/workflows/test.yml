name: E2E Tests

on:
  # Only run on PRs (covers every commit pushed to the feature branch while
  # the PR is open). The pull_request event does NOT double-fire alongside
  # the push event, so we get exactly 1 run per commit — not 2.
  pull_request:
    branches: ['**']
  # Also run on direct pushes to main (post-merge validation).
  push:
    branches: [main]

# Cancel any in-progress run for the same branch/PR when a new commit is
# pushed. Prevents stale jobs stacking up while you iterate.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Migration lint ──────────────────────────────────────────────────────────
  # Validates every SQL migration file on every PR — never skips, no Supabase
  # bot dependency. Catches syntax errors and type mismatches before merge.
  migration-lint:
    name: Migration lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Start local Postgres
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER testuser WITH SUPERUSER PASSWORD 'testpass';"
          sudo -u postgres psql -c "CREATE DATABASE testdb OWNER testuser;"

      - name: Run all migrations against local Postgres
        env:
          PGPASSWORD: testpass
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "▶ applying $f"
            psql -h localhost -U testuser -d testdb -f "$f" || exit 1
          done
          echo "✅ All migrations applied cleanly"

  # ── E2E browser tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false   # let all shards finish so we see ALL failures
      matrix:
        shard: [1, 2, 3, 4, 5, 6]   # 6 shards — each handles 1/6 of tests

    # Opt into Node 24 for action runners (checkout, cache, upload-artifact).
    # GitHub drops Node 20 from runners on Jun 2 2026 — this gets ahead of it.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          # GitHub Actions drops Node 20 for action runners on Jun 2 2026.
          # Opt into Node 24 now so the upgrade is on our schedule, not GitHub's.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Playwright 1.56
        # Pin to 1.56.0 — matches local dev setup and the browser revisions
        # already validated. Bump here when upgrading Playwright.
        run: npm install --no-save @playwright/test@1.56.0 serve

      # Cache browser binaries keyed to the Playwright version.
      # On cache hit the download (~500 MB) is skipped — saves ~60s per shard.
      # --with-deps still runs to ensure OS-level system libraries are present
      # (apt packages can't be cached), but the binaries are already on disk.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-1.56.0

      - name: Install Playwright browsers (WebKit + Chromium)
        run: npx playwright install --with-deps webkit chromium

      - name: Run Playwright tests (shard ${{ matrix.shard }}/6)
        run: npx playwright test --shard=${{ matrix.shard }}/6
        env:
          CI: true

      # Upload the full HTML report on EVERY run (pass or fail).
      # Each shard uploads its own report with a unique name.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      # Upload raw test results (traces, screenshots, videos) on failure.
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
