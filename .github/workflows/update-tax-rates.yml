name: Update Tax Rates

on:
  # Run on the 1st of every month at 06:00 UTC (midnight CT / 1 AM CT in summer)
  schedule:
    - cron: '0 6 1 * *'
  # Allow manual trigger from GitHub Actions UI for immediate re-seed
  workflow_dispatch:

jobs:
  update:
    name: Seed tax_rates table
    # Runs on self-hosted Proxmox runner — home IP bypasses SST WAF that blocks Azure/GitHub cloud IPs
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run tax rate updater
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/update-tax-rates.js
