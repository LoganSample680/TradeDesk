name: Auto Version

on:
  push:
    branches: [main]

concurrency:
  group: auto-version
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute and write version
        run: |
          DATE=$(TZ=America/Chicago date +'%m.%d.%y')
          TODAY=$(TZ=America/Chicago date +'%Y-%m-%d')

          N=$(git log --oneline --after="${TODAY}T00:00:00-06:00" origin/main \
              | grep -v '\[skip ci\]' \
              | wc -l | tr -d ' ')
          [ "$N" -eq 0 ] && N=1

          VERSION="${DATE}.${N}"
          echo "Version: $VERSION"

          # Match digit-only version format — never matches regex patterns in code
          sed -i "s/const APP_VERSION='[0-9][0-9]\.[0-9][0-9]\.[0-9][0-9]\.[0-9]*/const APP_VERSION='${VERSION}/g" index.html
          printf '{"version":"%s"}\n' "${VERSION}" > version.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html version.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "v${VERSION} [skip ci]"
          git push
